    - heading "Post-punk quintet from Liège & Brussels" [level=1] [ref=e5]
    - img "RICHARICHAR band" [ref=e7]
    - generic [ref=e8]:
      - heading "BIO" [level=2] [ref=e9]
      - paragraph [ref=e10]: RICHARICHAR draws from a lineage of modern post-punk acts such as Fontaines D.C. and Protomartyr, while reaching back to influences like Iggy Pop and the Velvet Underground.
      - paragraph [ref=e11]: These five regulars of the Belgian independent rock circuit (Eosine, It It Anita, Empereur, Two Kids on Holiday, Pirato Ketchup…) explore the dark corners of contemporary alienation, shaping a sound that is at once abrasive and fragile — where restraint collides with sudden bursts of intensity, and where the lyrics treat both modernity and nostalgia with equal contempt.
      - paragraph [ref=e12]: Following the release of their debut EP, Paraphernalia, in March 2026, the band is actively carving out their presence on European stages.
